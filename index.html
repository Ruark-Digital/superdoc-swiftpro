<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperDoc — SwiftPro Editor</title>
  </head>
  <body>
    <!-- SuperDoc renders its toolbar here and the document in #editor. The host
         (SwiftPro) embeds this page in an iframe. -->
    <div id="superdoc-toolbar"></div>
    <div id="editor"></div>
    <!-- AGPL §13: this app serves AGPL-licensed SuperDoc over a network, so it
         must offer its Corresponding Source to users who interact with it.
         Points at the public repository where the Corresponding Source lives. -->
    <a
      class="agpl-source-link"
      href="https://github.com/Ruark-Digital/superdoc-swiftpro"
      target="_blank"
      rel="noopener noreferrer"
      >Source (AGPL-3.0)</a
    >
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
